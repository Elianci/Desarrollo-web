<form class="formulario">
  <h1>FORMULARIO DE ADMISIÓN</h1>
  <h2>Datos Personales</h2>
  <label>Nombre y Apellidos:<input type="text"></label>
  <label>Fecha de Nacimiento:<input type="date"></label>
  <label>Sexo:
    <select>
      <option>Masculino</option>
      <option>Femenino</option>
    </select>
  </label>
  <label>Número de Teléfono:<input type="tel"></label>
  <label>Dirección:<input type="text"></label>
  <label>Ciudad:<input type="text"></label>
  <label>Región:<input type="text"></label>
  <label>Código Postal:<input type="text"></label>
  <label>País:<input type="text"></label>
  <label>Correo Electrónico:<input type="email"></label>
<link rel="stylesheet" href="css/styles.css">

  <button type="submit">Registrar</button>
</form>
