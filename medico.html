<form class="formulario">
  <h1>FORMULARIO MÉDICO</h1>
  <h2>Información del Paciente</h2>
  <label>Nombre y Apellidos:<input type="text"></label>
  <label>Fecha de Nacimiento:<input type="date"></label>
  <label>Dirección:<input type="text"></label>
  <label>Teléfono:<input type="tel"></label>
  <label>Sexo:
    <select>
      <option>Masculino</option>
      <option>Femenino</option>
      <option>Otro</option>
    </select>
  </label>
  <label>Código Postal:<input type="text"></label>
  <label>Correo Electrónico:<input type="email"></label>

  <h2>Motivo de la Visita</h2>
  <textarea rows="4"></textarea>

  <h2>Información del Seguro</h2>
  <label>Seguro Proveniente:<input type="text"></label>
  <label>Número de Póliza:<input type="text"></label>

  <h2>Contacto de Emergencia</h2>
  <label>Nombre y Apellidos:<input type="text"></label>
  <label>Teléfono:<input type="tel"></label>
  <label>Email:<input type="email"></label>

  <button type="submit">Enviar</button>
</form>
