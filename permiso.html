<form class="formulario">
  <h1>APPLICATION FOR PERMIT / ID CARD</h1>

  <h2>Applying For</h2>
  <label><input type="checkbox"> Permit</label>
  <label><input type="checkbox"> ID Card</label>
  <label><input type="checkbox"> Renewal</label>
  <label><input type="checkbox"> Replacement</label>

  <h2>Identification Information</h2>
  <label>Driver License: 
    <select>
      <option>Yes</option>
      <option>No</option>
    </select>
  </label>
  <label>Learner Permit: 
    <select>
      <option>Yes</option>
      <option>No</option>
    </select>
  </label>
  <label>Non-driver ID Card: 
    <select>
      <option>Yes</option>
      <option>No</option>
    </select>
  </label>

  <h2>Personal Information</h2>
  <label>Apellido:<input type="text"></label>
  <label>Nombre:<input type="text"></label>
  <label>Fecha de Nacimiento:<input type="date"></label>
  <label>Género:
    <select>
      <option>Masculino</option>
      <option>Femenino</option>
    </select>
  </label>
  <label>Nacionalidad:<input type="text"></label>

  <h2>ID Card Details</h2>
  <label>Número de Identificación:<input type="text"></label>
  <label>Fecha de Expiración:<input type="date"></label>
  <label>Tipo de Licencia:<input type="text"></label>
  <label>Licencia de otro estado:<input type="text"></label>

  <h2>Detalles Personales</h2>
  <label>Altura:<input type="text"></label>
  <label>Color de ojos:<input type="text"></label>
  <label>Email:<input type="email"></label>
  <label>Estado civil:
    <select>
      <option>Soltero</option>
      <option>Casado</option>
      <option>Divorciado</option>
    </select>
  </label>

  <h2>Dirección de residencia</h2>
  <label>Unidad:<input type="text"></label>
  <label>Calle:<input type="text"></label>
  <label>Ciudad:<input type="text"></label>
  <label>Estado:<input type="text"></label>
  <label>Código Postal:<input type="text"></label>
  <label>País:<input type="text"></label>

  <h2>Contacto</h2>
  <label>Teléfono Casa:<input type="tel"></label>
  <label>Móvil:<input type="tel"></label>
  <label>Fax:<input type="text"></label>
  <label>Teléfono Trabajo:<input type="tel"></label>

  <h2>Dirección de correo</h2>
  <label>Dirección Postal:<input type="text"></label>
  <label>¿Ha cambiado su dirección?: 
    <select>
      <option>Sí</option>
      <option>No</option>
    </select>
  </label>
  <label>Otro cambio:<input type="text"></label>

  <h2>SSN</h2>
  <input type="text" placeholder="###-##-####">

  <h2>Preguntas de Salud y Seguridad</h2>
  <label>¿Usa lentes o contactos?
    <select><option>Sí</option><option>No</option></select>
  </label>
  <label>¿Condición física/mental con medicación?
    <select><option>Sí</option><option>No</option></select>
  </label>
  <label>¿Ha tenido convulsiones o pérdida de conciencia?
    <select><option>Sí</option><option>No</option></select>
  </label>
  <label>¿Necesita equipo especial para trabajar?
    <select><option>Sí</option><option>No</option></select>
  </label>
  <label>¿Condena en últimos 10 años relacionada con vehículos?
    <select><option>Sí</option><option>No</option></select>
  </label>

  <h2>Firma</h2>
  <label>Firma:<input type="text"></label>

  <button type="submit">Enviar Solicitud</button>
</form>

<link rel="stylesheet" href="css/styles.css">
